<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Editor de Notícias</title>

<link href="https://cdn.jsdelivr.net/npm/quill@1.3.7/dist/quill.snow.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@jaames/iro@5"></script>

<style>
body {
  margin: 0;
  font-family: Verdana, Arial, sans-serif;
  background-image: url("https://i.imgur.com/j02oHtf.png");
  background-repeat: repeat;
  background-color: #d9d9d9;
  text-align: center;
}

.container {
  margin-top: 40px;
}

.logo {
  margin-bottom: 20px;
}

.window {
  width: 850px;
  height: 750px;
  margin: auto;
  background: #e6e6e6;
  border: 1px solid #888;
  border-radius: 14px;
  box-shadow: 0 4px 0 #666;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.window-header {
  background: #d0d0d0;
  padding: 10px;
  font-weight: bold;
  border-bottom: 1px solid #999;
}

.window-body {
  flex: 1;
  display: flex;
  padding: 10px;
  background: #ededed;
}

/* ESQUERDA */
.editor-side {
  flex: 2;
  display: flex;
  flex-direction: column;
}

/* DIREITA */
#optionsPanel {
  width: 240px;
  margin-left: 10px;
  background: #f5f5f5;
  border-left: 1px solid #aaa;
  padding: 8px;
  font-family: Verdana;
  font-size: 11px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}

/* EDITOR */
#editor {
  height: 580px;
  background: #fff;
  border: 1px solid #999;
  border-radius: 8px;
}

/* TOOLBAR */
.ql-toolbar {
  border: 1px solid #999 !important;
  background: #f2f2f2;
  border-radius: 6px;
  margin-bottom: 6px;
}

.ql-editor {
  font-family: Verdana !important;
  font-size: 11px !important;
}

/* BOTÕES */
.btn-row {
  display: flex;
  gap: 6px;
  margin-bottom: 6px;
}

.icon-btn {
  padding: 5px 10px;
  border: 1px solid #888;
  background: #fff;
  cursor: pointer;
  font-size: 12px;
  font-weight: bold;
  border-radius: 6px;
}

/* POPUPS */
.modal, #colorPopup {
  display: none;
  position: absolute;
  top: 180px;
  left: 50%;
  transform: translateX(-50%);
  background: #fff;
  border: 2px solid #333;
  border-radius: 10px;
  padding: 10px;
  box-shadow: 0 6px 0 #666;
  z-index: 999;
}

/* INPUTS (COMEÇAM ESCONDIDOS) */
#optionsPanel input[type="text"] {
  display: none;
  width: 100%;
  padding: 4px;
  border: 1px solid #999;
  border-radius: 4px;
}

#optionsPanel label {
  display: flex;
  align-items: center;
  gap: 5px;
}

/* OUTPUT */
#generatedCode {
  height: 120px;
  font-size: 10px;
}

/* FOOTER */
.footer {
  background: #fff;
  border-top: 1px solid #aaa;
  padding: 8px;
  font-size: 11px;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="container">

<div class="logo">
<img src="https://i.imgur.com/RWc63WZ.png">
</div>

<div class="window">

<div class="window-header">Editor de Notícias</div>

<div class="window-body">

<!-- ESQUERDA -->
<div class="editor-side">

<div class="btn-row">
<button class="icon-btn" onclick="openModal()">🖼 Imagem</button>
<button class="icon-btn" onclick="exportHTML()">📥 HTML</button>
<button class="icon-btn" onclick="toggleColorPicker()">🎨 Cores</button>
</div>

<div id="editor"></div>

<div class="modal" id="imgModal">
<input type="text" id="imageURL" placeholder="URL">
<button onclick="insertImage()">Inserir</button>
<button onclick="closeModal()">Fechar</button>
</div>

<div id="colorPopup">
<div id="colorWheel"></div>
<input id="hexInput" placeholder="#000000">
</div>

</div>

<!-- DIREITA -->
<div id="optionsPanel">

<h4>⚙️ Personalização da página Web (Em Desenvolvimento)</h4>

<label><input type="checkbox" id="optLogo"> Trocar logotipo Lella (289x84px)</label>
<input id="logoURL" placeholder="URL">

<label><input type="checkbox" id="optCursor"> Trocar cursor</label>
<input id="cursorURL" placeholder="URL">

<label><input type="checkbox" id="optBgColor"> Background em cor sólida</label>
<input id="bgColor" placeholder="#cor">

<label><input type="checkbox" id="optHideMoney"> Ocultar barra de moedas</label>

<label><input type="checkbox" id="optHeaderColor"> Header em cor sólida</label>
<input id="headerColor" placeholder="#cor">

<label><input type="checkbox" id="optHeaderImg"> Header em imagem repetida</label>
<input id="headerImg" placeholder="URL">

<label><input type="checkbox" id="optHideNewsHeader"> Ocultar header da notícia</label>

<!-- 🆕 NOVO -->
<label><input type="checkbox" id="optNewsIndexFont"> Índice notícias com fonte Verdana</label>

<label><input type="checkbox" id="optNewsIndexColor"> Cores do índice de notícias</label>
<input id="newsIndexBg" placeholder="#background">
<input id="newsIndexBorder" placeholder="#border">

<h4>💻 Código</h4>
<textarea id="generatedCode" readonly></textarea>

<button onclick="copyGenerated()">📋 Copiar código</button>

</div>

</div>

<div class="footer">Desenvolvido por Horus | @filipegaming | 2026</div>

</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/quill@1.3.7/dist/quill.min.js"></script>

<script>
var quill = new Quill('#editor',{theme:'snow'});
quill.root.style.fontFamily="Verdana";
quill.root.style.fontSize="11px";

/* IMAGE */
function openModal(){imgModal.style.display="block";}
function closeModal(){imgModal.style.display="none";}
function insertImage(){
if(imageURL.value){
quill.insertEmbed(quill.getSelection().index,'image',imageURL.value);
imageURL.value="";
closeModal();
}
}

/* EXPORT */
function exportHTML(){
navigator.clipboard.writeText(quill.root.innerHTML);
alert("HTML copiado!");
}

/* COLOR */
var picker=new iro.ColorPicker("#colorWheel",{width:150,color:"#4da6ff"});
picker.on("color:change",c=>{
hexInput.value=c.hexString;
quill.format("color",c.hexString);
});
hexInput.oninput=e=>{
let v=e.target.value;
if(/^#([0-9A-F]{3}){1,2}$/i.test(v)){
picker.color.set(v);
quill.format("color",v);
}
};
function toggleColorPicker(){
colorPopup.style.display=
colorPopup.style.display==="block"?"none":"block";
}

/* TOGGLE INPUTS */
function toggleInput(check,input){
const c=document.getElementById(check);
const i=document.getElementById(input);
if(i){
i.style.display = c.checked ? "block" : "none";
}
generate();
}

/* INIT */
function initOptions(){
[
["optLogo","logoURL"],
["optCursor","cursorURL"],
["optBgColor","bgColor"],
["optHeaderColor","headerColor"],
["optHeaderImg","headerImg"]
].forEach(([c,i])=>{
toggleInput(c,i);
document.getElementById(c).onchange=()=>toggleInput(c,i);
});
}

[
"logoURL","cursorURL","bgColor","headerColor","headerImg",
"newsIndexBg","newsIndexBorder"
].forEach(id=>{
document.getElementById(id).oninput=generate;
});

[
"optHideMoney","optHideNewsHeader",
"optNewsIndexFont","optNewsIndexColor"
].forEach(id=>{
document.getElementById(id).onchange=generate;
});

/* GERADOR */
function generate(){
let code="";

/* EXISTENTE */
if(optLogo.checked && logoURL.value){
code+=`<style>
.logo{background:none!important;}
.logo::after{
content:"";
display:block;
width:289px;height:84px;
background:url('${logoURL.value}') no-repeat center;
background-size:contain;
}
</style>\n`;
}

if(optCursor.checked && cursorURL.value){
code+=`<style>
body{cursor:url("${cursorURL.value}"),auto;}
</style>\n`;
}

if(optBgColor.checked && bgColor.value){
code+=`<style>
body{background-color:${bgColor.value}!important;}
</style>\n`;
}

if(optHideMoney.checked){
code+=`<style>
div.flex.justify-start.min-h-\\[50px\\]{display:none!important;}
</style>\n`;
}

if(optHeaderColor.checked && headerColor.value){
code+=`<style>
header{background:${headerColor.value}!important;}
</style>\n`;
}

if(optHeaderImg.checked && headerImg.value){
code+=`<style>
header{
background:url('${headerImg.value}')!important;
background-repeat:repeat!important;
}
</style>\n`;
}

if(optHideNewsHeader.checked){
code+=`<style>
div.w-full.h-16.flex.rounded-lg.shadow-lg{
display:none!important;
}
</style>\n`;
}

/* 🆕 INDEX FONT */
if(optNewsIndexFont.checked){
code+=`<style>
.border-b.uppercase.font-semibold {
  font-family: Verdana, sans-serif !important;
  font-size: 11px !important;
  color: #000000 !important;
}
.w-full.max-h-72 span {
  font-family: Verdana, sans-serif !important;
  font-size: 11px !important;
  color: #000000 !important;
}
</style>\n`;
}

/* 🆕 INDEX COLORS */
if(optNewsIndexColor.checked){
let bg = newsIndexBg.value || "#2b2b2b";
let border = newsIndexBorder.value || "#ff4d6d";

code+=`<style>
.lg\\:w-1\\/4 a {
  font-family: Verdana, sans-serif !important;
  font-size: 11px !important;
  color: #ffffff !important;
  font-weight: bold !important;

  background: ${bg} !important;
  display: block;
  border-radius: 3px;
  margin-bottom: 4px;
  padding: 4px 6px;

  border: 1px solid ${border} !important;

  image-rendering: pixelated;
}
</style>\n`;
}

generatedCode.value=code;
}

/* COPY */
function copyGenerated(){
navigator.clipboard.writeText(generatedCode.value);
alert("Código copiado!");
}

/* INIT */
initOptions();
</script>

</body>
</html>
